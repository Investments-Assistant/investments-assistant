version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
# Investment Assistant – Docker Compose
# All services run on the Raspberry Pi 5.
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-investment_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-ia_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ia_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Investment Assistant App ───────────────────────────────────────────────
  app:
    # CI pushes to GHCR; on the Pi run `docker compose pull && docker compose up -d`
    # to deploy. For local development run `docker compose up --build` to build locally.
    image: ghcr.io/investments-assistant/investments-assistant:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    volumes:
      - reports:/app/reports
      # Bind-mount the models directory from the host so GGUF files downloaded
      # with scripts/download_model.py are visible inside the container.
      # LLM_MODEL_PATH in .env must start with /app/models/...
      - ./models:/app/models:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    # NOT exposed directly — Nginx is the public entry point

  # ── Pi-hole (DNS ad blocker) ────────────────────────────────────────────────
  pihole:
    image: pihole/pihole:latest
    restart: unless-stopped
    ports:
      - "53:53/tcp"      # DNS
      - "53:53/udp"      # DNS
      - "8080:80/tcp"    # Pi-hole Web UI (LAN only — firewall-protected)
    environment:
      TZ: ${TZ:-Europe/Lisbon}
      WEBPASSWORD: ${PIHOLE_PASSWORD:?Set PIHOLE_PASSWORD in .env}
      PIHOLE_DNS_: "1.1.1.1;8.8.8.8"
      DNSMASQ_LISTENING: all
    volumes:
      - pihole_etc:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
    cap_add:
      - NET_ADMIN
    networks:
      - internal

  # ── Nginx (reverse proxy + IP whitelist) ────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/rate-limit.conf:/etc/nginx/conf.d/00-rate-limit.conf:ro
      - ./config/nginx/investment-assistant.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - internal
      - external

volumes:
  postgres_data:
  redis_data:
  pihole_etc:
  pihole_dnsmasq:
  reports:
  # models is a bind mount (./models), not a named volume — see app service above

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
