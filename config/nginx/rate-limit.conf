# Rate-limiting zones — defined in the http context.
# Mounted to /etc/nginx/conf.d/ so they're included automatically.
#
# These limits are a secondary defence on top of WireGuard authentication.
# They protect against a compromised VPN client or misconfigured peer
# hammering the API.

# General requests: 60 per minute per IP (~1/s sustained)
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;

# WebSocket connections: max 5 simultaneous per IP
limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

# Return 429 instead of the default 503 on rate-limit breach
limit_req_status 429;
limit_conn_status 429;
