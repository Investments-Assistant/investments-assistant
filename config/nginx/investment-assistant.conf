# ══════════════════════════════════════════════════════════════════════════════
# Nginx — Investment Assistant
#
# Security model:
#   - Only reachable from WireGuard VPN (10.8.0.0/24) and LAN (192.168.x.x)
#   - The DOCKER-USER iptables chain (set up by setup.sh) drops all other
#     traffic at the kernel level — Nginx never even sees internet traffic
#   - IP whitelist here is a defence-in-depth layer, not the primary control
#   - Rate limiting protects against a misbehaving VPN peer
# ══════════════════════════════════════════════════════════════════════════════

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    # ── TLS ────────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security headers ────────────────────────────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss:;" always;

    # ── IP whitelist (defence-in-depth) ─────────────────────────────────────────
    # Primary defence is the DOCKER-USER iptables chain in setup.sh.
    # This block is a redundant application-layer check.
    #
    # To require VPN even from home (maximum security), remove the 192.168 line.
    set $allowed 0;
    if ($remote_addr ~* ^10\.8\.0\.)    { set $allowed 1; }  # WireGuard VPN
    if ($remote_addr ~* ^192\.168\.)    { set $allowed 1; }  # LAN
    if ($remote_addr ~* ^172\.(1[6-9]|2[0-9]|3[01])\.) { set $allowed 1; }  # Docker bridge
    if ($allowed = 0) { return 403; }

    # ── WebSocket (chat) ────────────────────────────────────────────────────────
    location /ws/ {
        limit_conn  ws_conn 3;                  # max 3 WS connections per IP
        limit_req   zone=general burst=10 nodelay;

        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Static assets ───────────────────────────────────────────────────────────
    location /static/ {
        limit_req zone=general burst=30 nodelay;

        proxy_pass        http://app:8000;
        proxy_cache_valid 200 1h;
        add_header        Cache-Control "public, max-age=3600";
    }

    # ── REST API & UI ───────────────────────────────────────────────────────────
    location / {
        limit_req zone=general burst=20 nodelay;

        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
