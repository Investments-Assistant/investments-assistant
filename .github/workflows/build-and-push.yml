name: Build and Push Docker Image

# Runs automatically after e2e-tests succeed on main, or manually via workflow_dispatch.
# Builds a linux/arm64 image (Raspberry Pi 5 target) using QEMU emulation,
# and pushes it to the GitHub Container Registry (GHCR).

on:
  workflow_run:
    workflows: ["End-to-End Tests"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra image tag to apply (e.g. v1.2.3). 'latest' and the SHA are always added."
        required: false
        default: ""

jobs:
  build-and-push:
    name: Build ARM64 image and push to GHCR
    runs-on: ubuntu-latest
    # Skip if triggered by workflow_run and that run failed
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write

    timeout-minutes: 90  # llama-cpp-python compiles from source under QEMU — give it time

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # For workflow_run events, check out the commit that triggered the run
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up QEMU for ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/investments-assistant/investments-assistant
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=latest
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push linux/arm64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache keeps Docker layers warm between runs.
          # The expensive llama-cpp-python compile layer is cached as long as
          # pyproject.toml / poetry.lock / Dockerfile have not changed.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print pushed image tags
        run: echo "${{ steps.meta.outputs.tags }}"
